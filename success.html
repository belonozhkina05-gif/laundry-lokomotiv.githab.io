<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна — Санаторий Локомотив</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #e8f0e8 0%, #d4e0d4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 25px 45px -12px rgba(0, 40, 0, 0.25);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1a3a1a 0%, #2d5a2d 100%);
            padding: 24px 32px;
            border-bottom: 3px solid #ffc107;
        }
        .sanatorium-name {
            font-size: 1.9rem;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
        }
        .success-container {
            text-align: center;
            padding: 50px 30px;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .success-title {
            font-size: 2rem;
            color: #2d5a2d;
            margin-bottom: 20px;
        }
        .success-message {
            font-size: 1.2rem;
            color: #4a5c3e;
            margin-bottom: 30px;
        }
        .btn-home {
            background: #2d6a2d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-home:hover {
            background: #1e4a1e;
        }
        .auto-message {
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
        }
        .footer {
            background: #eef3e6;
            padding: 16px 32px;
            text-align: center;
            color: #4a6240;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="sanatorium-name">Санаторий «Локомотив»</h1>
        </header>
        
        <div class="success-container">
            <div class="success-icon">✅</div>
            <h2 class="success-title">Оплата прошла успешно!</h2>
            <p class="success-message" id="successMessage">
                Загрузка...
            </p>
            <a href="#" class="btn-home" id="backButton">Вернуться на главную</a>
            <p class="auto-message">
                Розетка включится автоматически в течение минуты.<br>
                Если этого не произошло — обратитесь к администратору.
            </p>
        </div>
        
        <footer class="footer">
            <p>© Санаторий «Локомотив» • Сервис аренды стиральной машины</p>
        </footer>
    </div>
    
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const deviceId = urlParams.get('device') || '01';
            
            const DEVICE_NAMES = {
                '01': 'Стиральная машина №1',
                '02': 'Стиральная машина №2',
                '03': 'Стиральная машина №3',
                '04': 'Стиральная машина №4',
                '05': 'Стиральная машина №5',
                '06': 'Стиральная машина №6',
                '07': 'Стиральная машина №7',
                '08': 'Стиральная машина №8',
                '09': 'Стиральная машина №9',
                '10': 'Стиральная машина №10'
            };
            
            const deviceName = DEVICE_NAMES[deviceId] || 'Стиральная машина';
            document.getElementById('successMessage').innerHTML = 
                `${deviceName} включена.<br>Она будет работать 2 часа 10 минут.`;
            
            // ВАЖНОЕ ИСПРАВЛЕНИЕ: правильный путь для кнопки "Вернуться"
            // Получаем базовый путь репозитория из текущего URL
            const path = window.location.pathname;
            const basePath = path.substring(0, path.lastIndexOf('/'));
            document.getElementById('backButton').href = `${basePath}/?device=${deviceId}`;
        })();
    </script>
</body>
</html>
